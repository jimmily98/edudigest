<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduDigest - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-indigo-900 text-white p-6 hidden md:block">
            <div class="flex items-center gap-3 mb-10">
                <div class="bg-indigo-500 p-2 rounded-lg text-2xl">📖</div>
                <h1 class="text-xl font-bold tracking-tight">EduDigest</h1>
            </div>
            <nav class="space-y-4">
                <a href="/" class="flex items-center gap-3 p-3 bg-indigo-800 rounded-lg text-white">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-indigo-200 hover:bg-indigo-800 rounded-lg transition">
                    <i class="fa-solid fa-folder"></i> My Notebooks
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-indigo-200 hover:bg-indigo-800 rounded-lg transition">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <header class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-bold">Course Insights</h2>
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-full bg-indigo-200 border-2 border-white shadow-sm flex items-center justify-center">
                        <i class="fa-solid fa-user text-indigo-600"></i>
                    </div>
                </div>
            </header>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="mb-6 p-4 bg-amber-50 border-l-4 border-amber-400 text-amber-700 rounded-r-lg">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <!-- Upload Section -->
            <section class="bg-white rounded-3xl p-10 border border-slate-100 shadow-sm mb-10">
                <form action="/upload" method="post" enctype="multipart/form-data" class="max-w-2xl mx-auto text-center">
                    <div class="mb-6">
                        <div class="bg-indigo-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-cloud-arrow-up text-3xl text-indigo-600"></i>
                        </div>
                        <h3 class="text-xl font-bold">Upload Course Materials</h3>
                        <p class="text-slate-500 mt-2">Upload videos, audio, or documents to begin the magic.</p>
                    </div>
                    
                    <div class="mb-8 group">
                        <label for="file-upload" class="border-2 border-dashed border-slate-200 rounded-2xl p-12 block hover:border-indigo-400 transition-colors cursor-pointer bg-slate-50/50">
                            <input id="file-upload" name="file" type="file" class="hidden" required onchange="updateFileName(this)">
                            <p id="file-name" class="text-slate-400 group-hover:text-indigo-600 transition">Click to select a file or drag & drop</p>
                            <p class="text-xs text-slate-300 mt-2 italic">Supports MP4, MP3, PDF, TXT</p>
                        </label>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-left mb-8">
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Notebook Name</label>
                            <input type="text" name="notebook_name" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none" placeholder="e.g. Intro to AI" required>
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Analysis Type</label>
                            <select name="action" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none bg-white">
                                <option value="gist">Executive Summary (Gist)</option>
                                <option value="faq">Generate FAQ</option>
                                <option value="study_guide">Create Study Guide</option>
                                <option value="briefing">Briefing Document</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition transform hover:-translate-y-0.5">
                        Start Intelligent Analysis
                    </button>
                </form>
            </section>
        </main>
    </div>

    <script>
        function updateFileName(input) {
            const fileName = input.files[0] ? input.files[0].name : "Click to select a file or drag & drop";
            document.getElementById('file-name').textContent = fileName;
            document.getElementById('file-name').classList.add('text-indigo-600', 'font-semibold');
        }
    </script>
</body>
</html>
